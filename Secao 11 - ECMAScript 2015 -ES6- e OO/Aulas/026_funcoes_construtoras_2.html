<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ECMAScript</title>
    </head>
    <body>

        <script>

            let Carro = function(){
                var velocidadeMaxima = 180
                var kmRodados = 0

                this.cor = 'Preto'
                this.modelo = 'Gol'
                this.velocidadeAtual = 0

                this.acelerar = function(){
                    let velocidade = this.getVelocidadeAtual() + 50
                    if(velocidade > velocidadeMaxima){
                        velocidade = velocidadeMaxima
                    }
                    this.setVelocidadeAtual(velocidade)

                    setKmRodados(0.07)
                    console.log('Km rodados: ' + kmRodados)
                }
                this.getVelocidadeAtual = function(){
                    return this.velocidadeAtual
                }
                this.setVelocidadeAtual = function(velocidadeAual) {
                    this.velocidadeAtual = velocidadeAual
                }
                var setKmRodados = function(km){
                    kmRodados += km
                }
            }

            let carro = new Carro()
            console.log(carro.velocidadeAtual)
            carro.acelerar()
            console.log(carro.velocidadeAtual)
            carro.acelerar()
            console.log(carro.velocidadeAtual)
            carro.acelerar()
            console.log(carro.velocidadeAtual)
            carro.acelerar()
            console.log(carro.velocidadeAtual)
            carro.acelerar()
            console.log(carro.velocidadeAtual)

        </script>
        
    </body>
</html>
