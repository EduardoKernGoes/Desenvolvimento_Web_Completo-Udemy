<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ECMAScript</title>
    </head>
    <body>

        <script>

            //Exemplo array
            let arr = [10, 20, 30, 40]

            function teste([a, b]) {
                console.log(a, b)
            }

            teste(arr)

            //Exemplo objeto
            let obj = {
                a: 10,
                b: 20,
                c: 30,
                d: 40
            }

            function teste2({a, b}){
                console.log(a, b)
            }

            teste2(obj)

        </script>
        
    </body>
</html>
