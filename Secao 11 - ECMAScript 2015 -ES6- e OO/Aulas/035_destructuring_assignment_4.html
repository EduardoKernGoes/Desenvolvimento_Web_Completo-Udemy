<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ECMAScript</title>
    </head>
    <body>

        <script>

            //Array
            let arr = [10, 20, 30, 40]

            let [a, ...resto] = arr

            console.log(a, resto)

            //Objeto
            let obj = {
                b: 10,
                c: 20,
                d: 30,
                e: 40
            }

            let { b, ...z} = obj

            console.log(b, z)

        </script>
        
    </body>
</html>
